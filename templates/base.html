<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NeoCast{% endblock %}</title>

    <meta name="description" content="{% block meta_description %}Plataforma de Podcasts impulsada por NeoCast.{% endblock %}">
    <meta property="og:title" content="{% block og_title %}NeoCast{% endblock %}">
    <meta property="og:description" content="{% block og_description %}Descubre nuestros programas y episodios.{% endblock %}">
    <meta property="og:image" content="{% block og_image %}{% endblock %}">
    <meta property="og:url" content="{{ request.url }}">
    <meta name="twitter:card" content="summary_large_image">

    <!-- Fuentes de Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Iconos FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-main: #080c14;
            --bg-surface: rgba(15, 22, 42, 0.6);
            --border-color: rgba(255, 255, 255, 0.08);
            --border-glow: rgba(16, 185, 129, 0.15);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #475569;
            --accent-primary: #10b981; /* Emerald Green */
            --accent-secondary: #34d399; /* Light Emerald */
            --accent-gradient: linear-gradient(135deg, #10b981 0%, #059669 100%);
            --accent-gradient-hover: linear-gradient(135deg, #059669 0%, #047857 100%);
            --success: #10b981;
            --danger: #ef4444;
            --font-head: 'Outfit', sans-serif;
            --font-body: 'Inter', sans-serif;
            --card-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        body {
            font-family: var(--font-body);
            background-color: var(--bg-main);
            background-image: 
                radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(5, 150, 105, 0.06) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .container { 
            max-width: 960px; 
            margin: 0 auto; 
            padding: 20px; 
            width: 100%;
            box-sizing: border-box;
        }
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            background-color: rgba(8, 12, 20, 0.75);
            border-bottom: 1px solid var(--border-color);
        }
        nav { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 15px 20px; 
            max-width: 960px;
            margin: 0 auto;
        }
        .nav-logo {
            font-family: var(--font-head);
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--text-primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transition: var(--transition);
        }
        .nav-logo:hover {
            opacity: 0.9;
        }
        .nav-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .btn { 
            background: var(--accent-gradient); 
            color: var(--text-primary); 
            padding: 10px 22px; 
            border-radius: 30px; 
            text-decoration: none; 
            font-weight: 600; 
            font-size: 0.9rem; 
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
            box-shadow: 0 4px 14px rgba(16, 185, 129, 0.3);
        }
        .btn:hover { 
            background: var(--accent-gradient-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.5);
            color: var(--text-primary);
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            box-shadow: none;
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: none;
            color: var(--text-primary);
        }
        .btn-danger {
            background: transparent;
            color: var(--danger);
            border: 1px solid var(--danger);
            box-shadow: none;
        }
        .btn-danger:hover {
            background: var(--danger);
            color: #fff;
            box-shadow: 0 4px 14px rgba(239, 68, 68, 0.3);
            transform: translateY(-2px);
        }
        .card { 
            background: var(--bg-surface); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color); 
            border-radius: 16px; 
            padding: 26px; 
            margin-bottom: 24px; 
            box-shadow: var(--card-shadow);
            transition: var(--transition);
        }
        .card:hover {
            border-color: rgba(16, 185, 129, 0.25);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45), 0 0 20px rgba(16, 185, 129, 0.08);
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: var(--font-head);
            color: var(--text-primary);
            font-weight: 700;
            margin-top: 0;
        }
        p {
            color: var(--text-secondary);
        }
        a {
            color: var(--accent-primary);
            text-decoration: none;
            transition: var(--transition);
        }
        a:hover {
            color: var(--accent-secondary);
        }
        
        /* Formularios Estilo Obsidian */
        label { 
            font-family: var(--font-head);
            font-weight: 600; 
            color: var(--text-primary); 
            display: block; 
            margin-top: 20px; 
            margin-bottom: 8px; 
            font-size: 0.95rem; 
        }
        input[type="text"], input[type="password"], input[type="url"], input[type="file"], textarea, select {
            width: 100%; 
            padding: 14px 16px;
            background: rgba(10, 15, 30, 0.8); 
            border: 1px solid var(--border-color); 
            color: var(--text-primary); 
            border-radius: 10px;
            box-sizing: border-box; 
            font-family: var(--font-body); 
            font-size: 1rem;
            transition: var(--transition);
        }
        input[type="text"]:focus, input[type="password"]:focus, input[type="url"]:focus, textarea:focus, select:focus { 
            outline: none; 
            border-color: var(--accent-primary); 
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15);
            background: rgba(15, 23, 42, 0.95);
        }
        textarea { 
            resize: vertical; 
            min-height: 140px; 
        }
        button[type="submit"] {
            background: var(--accent-gradient); 
            color: var(--text-primary); 
            border: none; 
            padding: 14px 24px; 
            margin-top: 25px;
            border-radius: 10px; 
            font-family: var(--font-head);
            font-weight: 700; 
            cursor: pointer; 
            width: 100%; 
            font-size: 1.1rem; 
            transition: var(--transition);
            box-shadow: 0 4px 14px rgba(16, 185, 129, 0.3);
        }
        button[type="submit"]:hover { 
            background: var(--accent-gradient-hover); 
            transform: translateY(-2px); 
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.5);
        }

        /* Footer */
        footer {
            margin-top: auto;
            padding: 30px 0;
            text-align: center;
            border-top: 1px solid var(--border-color);
            background-color: rgba(6, 10, 18, 0.4);
        }
        footer p {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        footer a {
            transition: var(--transition);
        }
        footer a:hover {
            color: var(--accent-primary) !important;
        }

        /* Alertas */
        .flash-msg {
            padding: 12px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideIn 0.3s ease-out;
        }
        .flash-error {
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.25);
            color: #fca5a5;
        }
        .flash-success {
            background: rgba(16, 185, 129, 0.12);
            border: 1px solid rgba(16, 185, 129, 0.25);
            color: #a7f3d0;
        }
        @keyframes slideIn {
            from { transform: translateY(-10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="/" class="nav-logo">
                <i class="fa-solid fa-microphone-lines"></i> NeoCast
            </a>
            <div class="nav-actions">
                {% if session.get('logged_in') %}
                    <a href="/admin" class="btn btn-secondary">
                        <i class="fa-solid fa-gauge"></i> Panel Admin
                    </a>
                    <a href="/logout" class="btn btn-danger">
                        <i class="fa-solid fa-right-from-bracket"></i> Salir
                    </a>
                {% endif %}
            </div>
        </nav>
    </header>
    
    <main class="container" style="flex: 1;">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="container">
            <p>
                <i class="fa-solid fa-podcast"></i> NeoCast &bull; Plataforma de Podcast Profesional y Autoalojada
                {% if not session.get('logged_in') %}
                    &bull; <a href="/login" style="color: var(--text-muted); font-size: 0.8rem; display: inline-flex; align-items: center; gap: 4px; transition: var(--transition);"><i class="fa-solid fa-lock"></i> Admin</a>
                {% endif %}
            </p>
        </div>
    </footer>
</body>
</html>
