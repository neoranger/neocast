<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NeoCast{% endblock %}</title>

    <meta name="description" content="{% block meta_description %}Plataforma de Podcasts impulsada por NeoCast.{% endblock %}">
    <meta property="og:title" content="{% block og_title %}NeoCast{% endblock %}">
    <meta property="og:description" content="{% block og_description %}Descubre nuestros programas y episodios.{% endblock %}">
    <meta property="og:image" content="{% block og_image %}{% endblock %}">
    <meta property="og:url" content="{{ request.url }}">
    <meta name="twitter:card" content="summary_large_image">

    <style>
        :root {
            --bg: #0a0a0a;
            --card-bg: #161616;
            --text: #ededed;
            --accent: #1db954; /* Un verde estilo Spotify para el audio */
            --gray: #333;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        nav { background: var(--card-bg); padding: 15px 0; border-bottom: 1px solid var(--gray); }
        nav .container { display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        nav a { color: var(--text); text-decoration: none; font-weight: bold; }
        .btn { background: var(--accent); color: #000; padding: 8px 15px; border-radius: 20px; text-decoration: none; font-weight: bold; font-size: 0.9rem; }
        .card { background: var(--card-bg); border: 1px solid var(--gray); border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        audio { width: 100%; margin-top: 15px; border-radius: 8px; }
        /* Forzar que el reproductor de audio nativo se vea un poco mejor en modo oscuro */
        audio::-webkit-media-controls-panel { background-color: #222; }
        audio::-webkit-media-controls-current-time-display,
        audio::-webkit-media-controls-time-remaining-display { color: #fff; }

        /* Estilos para Formularios en Modo Oscuro */
        label { font-weight: bold; color: #ccc; display: block; margin-top: 15px; margin-bottom: 5px; font-size: 0.9rem; }
        input[type="text"], input[type="file"], textarea, select {
            width: 100%; padding: 12px;
            background: #222; border: 1px solid #444; color: white; border-radius: 6px;
            box-sizing: border-box; font-family: inherit; font-size: 1rem;
        }
        input:focus, textarea:focus { outline: none; border-color: var(--accent); }
        textarea { resize: vertical; min-height: 120px; }
        button[type="submit"] {
            background: var(--accent); color: #000; border: none; padding: 12px 20px; margin-top: 20px;
            border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; font-size: 1rem; transition: 0.2s;
        }
        button[type="submit"]:hover { background: #179943; transform: translateY(-2px); }
    </style>
</head>
<body>
    <nav>
        <div class="container">
            <a href="/">🎙️ NeoCast</a>
            <div>
                {% if session.get('logged_in') %}
                    <a href="/admin" class="btn" style="background: #333; color: white; margin-right: 10px;">Panel Admin</a>
                    <a href="/logout" class="btn" style="background: transparent; border: 1px solid #ff4444; color: #ff4444;">Salir</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <div class="container" style="margin-top: 30px;">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
