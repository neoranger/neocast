{% extends "base.html" %}

{% block content %}
    <h1 style="text-align: center; margin-bottom: 40px;">Descubre nuestros Podcasts</h1>
    
    <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px;">
        {% for pod in podcasts %}
        <a href="/podcast/{{ pod.slug }}" class="card" style="text-decoration: none; color: inherit; display: block; transition: transform 0.2s;">
            <h2 style="margin-top: 0; color: var(--accent);">{{ pod.title }}</h2>
            <p style="color: #aaa; font-size: 0.9rem;">Por {{ pod.author }}</p>
            <p>{{ pod.description[:100] }}...</p>
        </a>
        {% else %}
        <p>No hay podcasts disponibles todavía.</p>
        {% endfor %}
    </div>
{% endblock %}
