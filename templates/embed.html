<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ episode.title }} - Embed</title>
    <!-- Fuentes premium Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0; 
            padding: 0; 
            background: transparent; /* Fondo transparente para adaptarse */
            font-family: 'Inter', system-ui, sans-serif;
        }
        .player-card {
            display: flex; 
            align-items: center; 
            background: #0b0f19; 
            border-radius: 12px;
            padding: 12px; 
            color: #f1f5f9; 
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            box-sizing: border-box;
            height: 100px;
        }
        .cover {
            width: 76px; 
            height: 76px; 
            border-radius: 8px; 
            object-fit: cover; 
            margin-right: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.05);
        }
        .cover-placeholder {
            width: 76px;
            height: 76px;
            border-radius: 8px;
            margin-right: 15px;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            color: #64748b;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.05);
        }
        .info {
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            justify-content: center;
            min-width: 0;
        }
        .title {
            margin: 0 0 2px 0; 
            font-size: 0.95rem; 
            color: #fff;
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            transition: color 0.2s;
        }
        .title:hover {
            color: #818cf8;
        }
        .podcast-name {
            margin: 0 0 6px 0; 
            font-size: 0.78rem; 
            color: #94a3b8;
            font-weight: 500;
        }
        audio { 
            width: 100%; 
            height: 28px; 
            outline: none; 
        }
        audio::-webkit-media-controls-panel {
            background-color: #111827;
        }
        audio::-webkit-media-controls-play-button,
        audio::-webkit-media-controls-volume-control-container,
        audio::-webkit-media-controls-timeline-element {
            filter: invert(1);
        }
        audio::-webkit-media-controls-current-time-display,
        audio::-webkit-media-controls-time-remaining-display {
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 0.72rem;
        }
    </style>
</head>
<body>
    <div class="player-card">
        {% if podcast.cover_image %}
        <img src="/media/{{ podcast.cover_image }}" class="cover" alt="Portada">
        {% else %}
        <div class="cover-placeholder">
            <i class="fa-solid fa-microphone"></i>
        </div>
        {% endif %}
        
        <div class="info">
            <a href="/podcast/{{ podcast.slug }}/{{ episode.slug }}" target="_blank" style="text-decoration: none;">
                <h4 class="title" title="{{ episode.title }}">{{ episode.title }}</h4>
            </a>
            <p class="podcast-name">{{ podcast.title }}</p>
            <audio id="embed-player" controls preload="metadata" src="/media/{{ episode.audio_file }}"></audio>
        </div>
    </div>

    <script>
        // ¡Registramos las escuchas incluso si le dan play desde el blog!
        const audioPlayer = document.getElementById('embed-player');
        let playCounted = false;

        audioPlayer.addEventListener('play', () => {
            if (!playCounted) {
                fetch('/api/play/{{ episode.id }}', { method: 'POST' });
                playCounted = true;
            }
        });
    </script>
</body>
</html>
